<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABS → StoryGraph</title>
  <style>
    :root {
      --bg:        #0d0d14;
      --surface:   #13131c;
      --surface2:  #1a1a26;
      --border:    #252535;
      --accent:    #8b5cf6;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --text-muted:#4b5563;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 15px;
    }

    .pills {
      display: flex;
      gap: 0.5rem;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.75rem 0.25rem 0.5rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.ok  { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.err { background: var(--red); }

    /* ── Layout ── */
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 1rem;
    }

    h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #7c3aed; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-ghost.active { border-color: var(--accent); color: var(--accent); }

    /* ── Books grid ── */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .book-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .book-meta { display: flex; flex-direction: column; gap: 0.2rem; }

    .book-title {
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.3;
      color: var(--text);
    }

    .book-author {
      font-size: 0.75rem;
      color: var(--accent2);
    }

    .progress-wrap { display: flex; flex-direction: column; gap: 0.5rem; }

    .progress-bar {
      height: 5px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .last-sync {
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 0.625rem;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.875rem;
      padding: 1.5rem 0;
      text-align: center;
    }

    /* ── Settings form ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 580px) { .settings-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 0.375rem; }
    .field.span2 { grid-column: 1 / -1; }

    label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
    }

    .input-row { position: relative; }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 2.5rem 0.6rem 0.875rem;
      color: var(--text);
      font-size: 0.8125rem;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    input.is-set { border-color: #2d4a3e; background: #0f1f1a; }

    .eye-btn {
      position: absolute;
      right: 0.625rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.25rem;
      line-height: 1;
    }
    .eye-btn:hover { color: var(--text-dim); }

    .hint {
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      gap: 1rem;
    }

    .save-msg {
      font-size: 0.8rem;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-msg.show { opacity: 1; }

    /* ── Logs ── */
    .log-toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .log-box {
      background: #080810;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem 1rem;
      height: 280px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.72rem;
      line-height: 1.75;
      scroll-behavior: smooth;
    }

    .log-line { display: flex; gap: 0.75rem; min-width: 0; }
    .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-lvl  { flex-shrink: 0; width: 4.5ch; }
    .log-lvl.INFO    { color: #4b5563; }
    .log-lvl.WARNING { color: var(--yellow); }
    .log-lvl.ERROR   { color: var(--red); }
    .log-msg  { color: var(--text-dim); word-break: break-all; min-width: 0; }
    .log-msg.err { color: var(--red); }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    /* ── Sync result ── */
    .sync-result {
      margin-top: 1rem;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 0.875rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .badge {
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge.success { background: #0d2a1f; color: var(--green); }
    .badge.failed  { background: #2a0d0d; color: var(--red); }
    .badge.not_found { background: #1a1a0d; color: var(--yellow); }
    .badge.error   { background: #2a0d0d; color: var(--red); }

    .result-title { font-weight: 500; flex: 1; }
    .result-pct   { color: var(--text-dim); font-size: 0.72rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.8125rem;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { border-color: var(--green); }
    #toast.err { border-color: var(--red); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📚</div>
    ABS → StoryGraph
  </div>
  <div style="display:flex;align-items:center;gap:0.75rem">
    <div class="pills">
      <div class="pill"><div class="dot" id="d-abs"></div><span id="l-abs">ABS</span></div>
      <div class="pill"><div class="dot" id="d-sg"></div><span id="l-sg">StoryGraph</span></div>
      <div class="pill"><div class="dot ok" id="d-poll"></div><span id="l-poll">Auto-sync</span></div>
    </div>
    {% if auth_enabled %}
    <a href="/logout" style="font-size:0.75rem;color:var(--text-dim);text-decoration:none;padding:0.25rem 0.6rem;border:1px solid var(--border);border-radius:6px;transition:color 0.15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dim)'">Sign out</a>
    {% endif %}
  </div>
</header>

<main>

  <!-- Currently Listening -->
  <div class="card">
    <div class="section-header">
      <h2>Currently Listening</h2>
      <button class="btn btn-primary" id="sync-btn" onclick="triggerSync()">
        <span id="sync-label">Sync Now</span>
      </button>
    </div>
    <div class="books-grid" id="books-grid">
      <div class="empty-state">Loading…</div>
    </div>
    <div class="sync-result" id="sync-result"></div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="section-header"><h2>Settings</h2></div>
    <form onsubmit="saveSettings(event)">
      <div class="settings-grid">
        <div class="field">
          <label>ABS URL</label>
          <div class="input-row">
            <input type="text" id="s-abs-url" placeholder="http://localhost:13378">
          </div>
        </div>
        <div class="field">
          <label>ABS API Token</label>
          <div class="input-row">
            <input type="password" id="s-abs-token" placeholder="••••••••">
            <button type="button" class="eye-btn" onclick="toggle('s-abs-token',this)">👁</button>
          </div>
        </div>
        <div class="field span2">
          <label>StoryGraph Session Cookie</label>
          <div class="input-row">
            <input type="password" id="s-sg-session" placeholder="••••••••">
            <button type="button" class="eye-btn" onclick="toggle('s-sg-session',this)">👁</button>
          </div>
          <span class="hint">Browser DevTools → Application → Cookies → app.thestorygraph.com → _storygraph_session</span>
        </div>
        <div class="field span2">
          <label>StoryGraph Remember Token <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional — extends session life)</span></label>
          <div class="input-row">
            <input type="password" id="s-sg-remember" placeholder="••••••••">
            <button type="button" class="eye-btn" onclick="toggle('s-sg-remember',this)">👁</button>
          </div>
          <span class="hint">remember_user_token cookie</span>
        </div>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <span class="save-msg" id="save-msg">✓ Saved — changes take effect immediately</span>
      </div>
    </form>
  </div>

  <!-- Logs -->
  <div class="card">
    <div class="section-header">
      <h2>Logs</h2>
      <div class="log-toolbar">
        <button class="btn btn-ghost active" id="auto-btn" onclick="toggleAuto(this)">Auto-refresh</button>
        <button class="btn btn-ghost" onclick="clearLogs()">Clear</button>
      </div>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

</main>

<div id="toast"></div>

<script>
  let autoRefresh = true;
  let timer;
  let shownLogs = 0;

  // ── Status ────────────────────────────────────────────────────────────────

  async function fetchStatus() {
    try {
      const d = await (await fetch('/api/status')).json();

      setDot('d-abs', 'l-abs', d.abs_ok, 'ABS');
      setDot('d-sg',  'l-sg',  d.sg_ok,  'StoryGraph');
      document.getElementById('l-poll').textContent = `Every ${d.poll_interval}s`;

      const grid = document.getElementById('books-grid');
      if (!d.books?.length) {
        grid.innerHTML = '<div class="empty-state">No audiobooks in progress.</div>';
        return;
      }
      grid.innerHTML = d.books.map(b => {
        const synced = d.last_synced[b.title];
        const syncedLabel = synced != null
          ? `Last synced at ${synced} min (${b.progress_percent}%)`
          : 'Not yet synced this session';
        return `
          <div class="book-card">
            <div class="book-meta">
              <div class="book-title">${esc(b.title)}</div>
              <div class="book-author">${esc(b.author)}</div>
            </div>
            <div class="progress-wrap">
              <div class="progress-bar">
                <div class="progress-fill" style="width:${b.progress_percent}%"></div>
              </div>
              <div class="progress-row">
                <span>${b.progress_percent}%</span>
                <span>${b.current_minutes} / ${b.duration_minutes} min</span>
              </div>
            </div>
            <div class="last-sync">${esc(syncedLabel)}</div>
          </div>`;
      }).join('');
    } catch(e) {}
  }

  function setDot(dotId, lblId, ok, label) {
    document.getElementById(dotId).className = 'dot ' + (ok ? 'ok' : 'err');
    document.getElementById(lblId).textContent = label;
  }

  // ── Sync ─────────────────────────────────────────────────────────────────

  async function triggerSync() {
    const btn = document.getElementById('sync-btn');
    const lbl = document.getElementById('sync-label');
    btn.disabled = true;
    lbl.innerHTML = '<div class="spinner"></div>';
    const resultEl = document.getElementById('sync-result');
    resultEl.style.display = 'none';
    try {
      const d = await (await fetch('/api/sync', { method: 'POST' })).json();
      if (d.error) {
        toast(d.error, 'err');
      } else {
        toast(`✓ ${d.synced}/${d.total} books synced`);
        resultEl.style.display = 'flex';
        resultEl.innerHTML = (d.results || []).map(r => `
          <div class="result-row">
            <span class="badge ${r.status}">${r.status.replace('_',' ')}</span>
            <span class="result-title">${esc(r.title)}</span>
            ${r.progress_percent != null ? `<span class="result-pct">${r.progress_percent}%</span>` : ''}
          </div>`).join('');
        fetchStatus();
        fetchLogs(true);
      }
    } catch(e) {
      toast('Sync request failed', 'err');
    } finally {
      btn.disabled = false;
      lbl.textContent = 'Sync Now';
    }
  }

  // ── Settings ──────────────────────────────────────────────────────────────

  async function loadSettings() {
    try {
      const d = await (await fetch('/api/settings')).json();
      if (d.ABS_URL) document.getElementById('s-abs-url').value = d.ABS_URL;
      ['s-abs-token','s-sg-session','s-sg-remember'].forEach((id, i) => {
        const key = ['ABS_TOKEN','STORYGRAPH_SESSION','STORYGRAPH_REMEMBER_TOKEN'][i];
        if (d[key] === 'set') {
          document.getElementById(id).placeholder = '(already set)';
          document.getElementById(id).classList.add('is-set');
        }
      });
    } catch(e) {}
  }

  async function saveSettings(e) {
    e.preventDefault();
    const payload = {};
    const fields = {
      'ABS_URL':                    's-abs-url',
      'ABS_TOKEN':                  's-abs-token',
      'STORYGRAPH_SESSION':         's-sg-session',
      'STORYGRAPH_REMEMBER_TOKEN':  's-sg-remember',
    };
    for (const [key, id] of Object.entries(fields)) {
      const v = document.getElementById(id).value;
      if (v) payload[key] = v;
    }
    const r = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (r.ok) {
      const msg = document.getElementById('save-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 4000);
      // Clear fields after save
      ['s-abs-token','s-sg-session','s-sg-remember'].forEach(id => {
        document.getElementById(id).value = '';
        document.getElementById(id).placeholder = '(already set)';
        document.getElementById(id).classList.add('is-set');
      });
      fetchStatus();
    }
  }

  function toggle(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
  }

  // ── Logs ──────────────────────────────────────────────────────────────────

  async function fetchLogs(force = false) {
    try {
      const d = await (await fetch('/api/logs')).json();
      if (d.logs.length === shownLogs && !force) return;
      const box = document.getElementById('log-box');
      const atBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 40;
      box.innerHTML = d.logs.map(l => `
        <div class="log-line">
          <span class="log-time">${esc(l.time)}</span>
          <span class="log-lvl ${l.level}">${l.level.slice(0,4)}</span>
          <span class="log-msg ${l.level==='ERROR'?'err':''}">${esc(l.msg)}</span>
        </div>`).join('');
      shownLogs = d.logs.length;
      if (atBottom) box.scrollTop = box.scrollHeight;
    } catch(e) {}
  }

  function clearLogs() {
    document.getElementById('log-box').innerHTML = '';
    shownLogs = 0;
  }

  function toggleAuto(btn) {
    autoRefresh = !autoRefresh;
    btn.classList.toggle('active', autoRefresh);
    btn.textContent = autoRefresh ? 'Auto-refresh' : 'Auto-refresh (off)';
    if (autoRefresh) startTimer(); else clearInterval(timer);
  }

  function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => { fetchStatus(); fetchLogs(); }, 5000);
  }

  // ── Toast ─────────────────────────────────────────────────────────────────

  let toastTimer;
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3500);
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  fetchStatus();
  fetchLogs();
  loadSettings();
  startTimer();
</script>
</body>
</html>
